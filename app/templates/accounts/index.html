{% extends "base.html" %}

{% block title %}資產帳戶 - 個人記帳簿{% endblock %}

{% block content %}
<div class="animate-fade-in">
    <div class="row g-4 mb-5">
        <div class="col-md-8">
            <h1 class="fw-bold mb-1">資產帳戶</h1>
            <p class="text-muted">管理您的錢包、銀行與信用卡</p>
        </div>
        <div class="col-md-4 text-md-end">
            <a href="{{ url_for('accounts.new') }}" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-1"></i>新增帳戶
            </a>
        </div>
    </div>

    <div class="row g-4">
        {% for acc in accounts %}
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-4 text-primary">
                        <i class="bi bi-credit-card fs-4"></i>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-link text-muted p-0" data-bs-toggle="dropdown">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm rounded-4">
                            <li><a class="dropdown-item" href="{{ url_for('accounts.edit', id=acc.id) }}">編輯</a></li>
                        </ul>
                    </div>
                </div>
                <h5 class="fw-bold mb-1">{{ acc.name }}</h5>
                <h3 class="fw-bold mb-0">${{ "{:,.2f}".format(acc.balance) }}</h3>
                <p class="text-muted small mt-3 mb-0">建立於 {{ acc.created_at.strftime('%Y/%m/%d') }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
