{% extends "base.html" %}

{% block title %}帳戶管理 - 個人記帳簿{% endblock %}

{% block content %}
<div class="animate-fade-in">
    <div class="row mb-5 align-items-center">
        <div class="col-md-8">
            <h1 class="fw-bold mb-0">我的帳戶</h1>
            <p class="text-muted">管理您的錢包、銀行卡與行動支付</p>
        </div>
        <div class="col-md-4 text-md-end">
            <a href="{{ url_for('accounts.new') }}" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-1"></i>建立新帳戶
            </a>
        </div>
    </div>

    <div class="row g-4">
        {% for acc in accounts %}
        <div class="col-md-4">
            <div class="card border-0 p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-4 text-primary">
                        <i class="bi bi-credit-card fs-4"></i>
                    </div>
                    <a href="{{ url_for('accounts.edit', id=acc.id) }}" class="btn btn-link text-muted p-0"><i class="bi bi-pencil-square fs-5"></i></a>
                </div>
                <h5 class="fw-bold mb-1">{{ acc.name }}</h5>
                <h3 class="fw-bold mb-0">${{ "{:,.2f}".format(acc.balance) }}</h3>
                <p class="text-muted small mt-3 mb-0">建立於 {{ acc.created_at.strftime('%Y/%m/%d') }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
