{% extends "base.html" %}

{% block title %}刪除確認 - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-header bg-danger bg-gradient text-white border-bottom-0 py-3">
                <h4 class="mb-0 fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i>刪除確認</h4>
            </div>
            <div class="card-body text-center p-5">
                <h5 class="mb-4">確定要刪除食譜「<span class="text-danger fw-bold fs-4">{{ recipe.name }}</span>」嗎？</h5>
                
                <div class="alert alert-warning mb-4 text-start">
                    <strong>注意：</strong> 這個操作無法復原。<br>
                    與之相關的材料和步驟（共 {{ recipe.ingredients|length }} 項材料、{{ recipe.steps|length }} 個步驟）也會一併被永久刪除。
                </div>
                
                <form action="{{ url_for('recipes.delete', id=recipe.id) }}" method="POST" class="mt-4 d-flex justify-content-center gap-3">
                    <a href="{{ url_for('recipes.detail', id=recipe.id) }}" class="btn btn-light border px-4">取消，保留食譜</a>
                    <button type="submit" class="btn btn-danger px-4 fw-bold">是的，我要刪除</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
