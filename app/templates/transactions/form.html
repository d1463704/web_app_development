{% extends "base.html" %}

{% block title %}{{ '編輯' if transaction else '新增' }}交易 - 個人記帳簿{% endblock %}

{% block content %}
<div class="animate-fade-in row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('transactions.index') }}" class="btn btn-link text-dark p-0 me-3"><i class="bi bi-arrow-left fs-3"></i></a>
            <h2 class="fw-bold mb-0">{{ '編輯交易紀錄' if transaction else '新增交易紀錄' }}</h2>
        </div>

        <div class="card border-0 p-4 p-md-5">
            <form method="POST" action="{{ url_for('transactions.create') }}">
                <div class="mb-4 text-center">
                    <div class="btn-group w-100 rounded-4 overflow-hidden shadow-sm" role="group">
                        <input type="radio" class="btn-check" name="type" id="type_expense" value="expense" checked>
                        <label class="btn btn-outline-danger py-2 fw-bold" for="type_expense">支出</label>
                        
                        <input type="radio" class="btn-check" name="type" id="type_income" value="income">
                        <label class="btn btn-outline-success py-2 fw-bold" for="type_income">收入</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="amount" class="form-label small fw-bold text-muted">金額</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 rounded-start-4 fw-bold">$</span>
                        <input type="number" step="0.01" class="form-control bg-light border-0 rounded-end-4 py-3 fs-4 fw-bold" 
                               id="amount" name="amount" required placeholder="0.00">
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label for="category_id" class="form-label small fw-bold text-muted">分類</label>
                        <select class="form-select bg-light border-0 rounded-4 py-2" id="category_id" name="category_id" required>
                            <option value="">請選擇</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-6">
                        <label for="account_id" class="form-label small fw-bold text-muted">帳戶</label>
                        <select class="form-select bg-light border-0 rounded-4 py-2" id="account_id" name="account_id" required>
                            <option value="">請選擇</option>
                            {% for acc in accounts %}
                            <option value="{{ acc.id }}">{{ acc.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="date" class="form-label small fw-bold text-muted">日期</label>
                    <input type="date" class="form-control bg-light border-0 rounded-4 py-2" id="date" name="date" 
                           value="{{ today or '' }}" required>
                </div>

                <div class="mb-5">
                    <label for="note" class="form-label small fw-bold text-muted">備註（選填）</label>
                    <textarea class="form-control bg-light border-0 rounded-4 py-3" id="note" name="note" rows="3" placeholder="備註一點細節..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-4 py-3 fw-bold shadow-sm">確認送出</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
